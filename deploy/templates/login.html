{% extends "base.html" %}
{% block title %}Sign In · FireGuard{% endblock %}

{% block content %}
<section class="login-shell">
    <div class="login-bg-grid"></div>
    <div class="login-bg-glow"></div>

    <div class="login-panel">
        <div class="brand-lockup" style="display: flex; flex-direction: column; align-items: center; text-align: center; margin-bottom: 20px;">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="FireGuard Logo" style="height: 180px; width: auto; filter: drop-shadow(0 0 12px rgba(255, 78, 0, 0.35));">
        </div>



        <form method="post" class="login-form" id="loginForm" novalidate>
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div>
                <label class="form-label" for="username">Username</label>
                <input class="form-control form-control-lg{% if username_error %} error{% endif %}" id="username" name="username"
                       autofocus autocomplete="username" maxlength="100"
                       placeholder="Enter your username">
            </div>
            <div>
                <label class="form-label" for="password">Password</label>
                <div class="password-field">
                    <input class="form-control form-control-lg{% if password_error %} error{% endif %}" id="password" name="password"
                           type="password" autocomplete="current-password" maxlength="200"
                           placeholder="••••••••">
                    <button type="button" class="password-toggle-btn" tabindex="-1"
                            aria-label="Show password" onclick="togglePasswordVisibility('password', this)">
                        <i data-lucide="eye"></i>
                    </button>
                </div>
            </div>
            <div style="display:flex; justify-content:center; margin: 4px 0 8px;">
                <div class="g-recaptcha" data-sitekey="{{ recaptcha_site_key }}"></div>
            </div>
            <button class="btn btn-brand btn-lg w-100" type="submit" id="loginBtn">
                <i data-lucide="shield-check"></i>
                Sign in to FireGuard
            </button>
        </form>
    </div>
</section>
{% endblock %}

{% block head %}
<script src="https://www.google.com/recaptcha/api.js" async defer></script>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
    const usernameEl = document.getElementById('username');
    const passwordEl = document.getElementById('password');
    usernameEl.classList.remove('error');
    passwordEl.classList.remove('error');

    const usernameBlank = !usernameEl.value.trim();
    const passwordBlank = !passwordEl.value.trim();
    if (usernameBlank || passwordBlank) {
        e.preventDefault();
        if (usernameBlank) usernameEl.classList.add('error');
        if (passwordBlank) passwordEl.classList.add('error');
        return;
    }

    const btn = document.getElementById('loginBtn');
    btn.innerHTML = '<i data-lucide="loader-2" class="spin"></i> Signing in…';
    btn.disabled = true;
    lucide.createIcons();
});
</script>
<style>
.spin { animation: spin .8s linear infinite; display:inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
{% endblock %}
